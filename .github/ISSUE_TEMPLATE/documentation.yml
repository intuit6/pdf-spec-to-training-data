**文档问题类型**
- [ ] 有语法错误或拼写错误
- [ ] 有误导或不准确的信息
- [ ] 有缺失的信息
- [ ] 示例代码不工作
- [ ] 其他：

**受影响的部分**
指明哪个文档文件或部分需要改进：
- [ ] README.md
- [ ] QUICKSTART.md
- [ ] docs/USAGE.md
- [ ] 配置文件示例
- [ ] 代码注释
- [ ] 其他：____________

**问题描述**
清晰描述问题是什么，包括：
 - 当前内容（如果有）
 - 建议的更改
 - 为什么这个更改是必要的

**建议的更改**
提供具体的文本或代码更改建议。

**额外信息**
添加任何相关的链接、截图或参考资料。
