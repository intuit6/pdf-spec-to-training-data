---
name: "Bug Report"
about: "报告一个问题或错误"
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: ""

---

**描述问题**
简要清晰地描述问题是什么。

**复现步骤**
1. 去 '...'
2. 运行 '....'
3. 看到错误 '....'

**期望行为**
清晰描述期望发生什么。

**实际行为**
清晰描述实际发生了什么，包括错误信息和堆栈跟踪。

**截图**
如果适用，添加截图帮助说明问题。

**环境信息**
 - 操作系统: [例如: Ubuntu 22.04, Windows 11, macOS 14]
 - Python 版本: [例如: 3.10.12]
 - 包版本: [例如: 1.0.0]
 - PDF 文件类型: [例如: 扫描件/文字型/混合型]

**附加信息**
添加任何可能有助于调试问题的额外信息，例如：
- 相关配置片段
- 处理的大致 PDF 大小和页数
- 是否使用了 OCR
- 错误日志

**最小复现示例**
如果可能，提供最小的可复现代码或说明如何创建测试 PDF。
