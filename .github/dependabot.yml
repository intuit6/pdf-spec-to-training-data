# Dependabot 配置
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # 更新 GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "yourusername"  # 替换为你的 GitHub 用户名

  # 更新 Python 依赖
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "yourusername"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "direct"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "direct"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*test*"
          - "*dev*"
          - "pytest"
          - "black"
          - "flake8"

  # 更新 Docker 镜像（如果使用）
  # - package-ecosystem: "docker"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
